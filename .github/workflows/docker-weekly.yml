# Weekly image build using the official OpenClaw gateway image tag `latest`
# as the Dockerfile OPENCLAW_BASE (always whatever upstream currently points to).

name: Docker weekly

on:
  schedule:
    # Mondays 06:15 UTC — pick a quiet slot; adjust as you like
    - cron: "15 6 * * 1"
  workflow_dispatch:

permissions:
  contents: read
  packages: write

concurrency:
  group: docker-openclaw-weekly
  cancel-in-progress: true

env:
  REGISTRY: ghcr.io
  OPENCLAW_IMAGE: ghcr.io/openclaw/openclaw

jobs:
  build:
    runs-on: ubuntu-latest
    # Avoid publishing `latest` from feature branches (schedule already uses default).
    if: github.ref == format('refs/heads/{0}', github.event.repository.default_branch)
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set image name (GHCR must be lowercase)
        run: echo "IMAGE_NAME=${GITHUB_REPOSITORY@L}" >> "$GITHUB_ENV"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Resolve upstream `latest` digest
        id: upstream
        run: |
          DIGEST="$(docker buildx imagetools inspect "${OPENCLAW_IMAGE}:latest" --format '{{print .Digest}}')"
          echo "digest=${DIGEST}" >> "$GITHUB_OUTPUT"
          echo "OPENCLAW_BASE=${OPENCLAW_IMAGE}:latest@${DIGEST}" >> "$GITHUB_ENV"

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest
            type=schedule,pattern=weekly-{{date 'YYYYMMDD'}}
            type=sha,prefix=,format=short
          labels: |
            org.opencontainers.image.base.name=${{ env.OPENCLAW_IMAGE }}:latest
            org.opencontainers.image.base.digest=${{ steps.upstream.outputs.digest }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          push: true
          build-args: |
            OPENCLAW_BASE=${{ env.OPENCLAW_BASE }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
